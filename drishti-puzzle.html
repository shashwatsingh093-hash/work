<!DOCTYPE html>
<html>
<head>
<title>For Drishti ❤️</title>

<style>

body{
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
color:white;
}

h1{
margin-top:30px;
}

#puzzle{
width:300px;
height:300px;
margin:30px auto;
display:grid;
grid-template-columns:repeat(3,1fr);
grid-template-rows:repeat(3,1fr);
gap:2px;
}

.tile{
background-image:url("photo.jpg");
background-size:300px 300px;
cursor:pointer;
}

.empty{
background:none;
cursor:default;
}

#message{
font-size:24px;
margin-top:20px;
}

</style>
</head>

<body>

<h1>Hi Drishti ❤️</h1>
<p>Shashwat made a little puzzle for you</p>

<div id="puzzle"></div>

<div id="message"></div>

<script>

let order=[0,1,2,3,4,5,6,7,8];

function shuffle(){
order.sort(()=>Math.random()-0.5);
}

function draw(){

const puzzle=document.getElementById("puzzle");
puzzle.innerHTML="";

order.forEach((num,i)=>{

let tile=document.createElement("div");

if(num===8){
tile.classList.add("empty");
}else{
tile.classList.add("tile");

let x=(num%3)*100;
let y=Math.floor(num/3)*100;

tile.style.backgroundPosition=`-${x}px -${y}px`;

tile.onclick=()=>move(i);
}

puzzle.appendChild(tile);

});

checkWin();

}

function move(i){

let emptyIndex=order.indexOf(8);

let valid=[i-1,i+1,i-3,i+3];

if(valid.includes(emptyIndex)){

[order[i],order[emptyIndex]]=[order[emptyIndex],order[i]];

draw();

}

}

function checkWin(){

let win=[0,1,2,3,4,5,6,7,8];

if(JSON.stringify(order)===JSON.stringify(win)){

document.getElementById("message").innerHTML=
"Drishti ❤️ You completed the puzzle… just like you completed my life. — Shashwat";

}

}

shuffle();
draw();

</script>

</body>
</html>
